<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMEN SHIFT | Future of Coffee</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-black: #000000;
            --shift-lime: #CCFF00;
            --text-white: #FFFFFF;
            --text-gray: #888888;
            --font-display: 'Archivo Black', sans-serif;
            --font-main: 'Inter', sans-serif;
        }

        /* ЗАЩИТА ОТ КОПИРОВАНИЯ */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-user-select: none; -moz-user-select: none;
            -ms-user-select: none; user-select: none;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: var(--font-main);
            overflow-x: hidden;
        }

        /* ПЛАВНОЕ ПОЯВЛЕНИЕ */
        .fade-wrapper { 
            opacity: 0; 
            transform: translateY(30px);
            filter: blur(10px);
            transition: opacity 1.6s cubic-bezier(0.16, 1, 0.3, 1), 
                        transform 1.6s cubic-bezier(0.16, 1, 0.3, 1), 
                        filter 1.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .fade-wrapper.is-visible {
            opacity: 1; transform: translateY(0); filter: blur(0);
        }

        nav {
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #111;
            position: fixed;
            width: 100%;
            top: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            z-index: 100;
        }

        .logo { font-family: var(--font-display); text-decoration: none; color: white; font-size: 1.1rem; text-transform: uppercase; }
        .logo span { color: var(--shift-lime); }

        .nav-links a { color: white; text-decoration: none; margin-right: 30px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; transition: 0.3s; }
        .nav-links a:hover { color: var(--shift-lime); }

        .cart-trigger {
            background: var(--shift-lime);
            color: black;
            padding: 8px 18px;
            font-family: var(--font-display);
            font-size: 0.75rem;
            cursor: pointer;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }

        /* HERO SECTION */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            padding: 0 5%;
        }

        .hero h1 {
            font-family: var(--font-display);
            font-size: clamp(3rem, 12vw, 8rem);
            line-height: 0.85;
            text-transform: uppercase;
            margin-bottom: 2rem;
        }

        .hero h1 span {
            display: block;
            color: transparent;
            -webkit-text-stroke: 1px var(--shift-lime);
        }

        .cta-btn {
            padding: 20px 40px;
            background: var(--shift-lime);
            color: black;
            text-decoration: none;
            font-family: var(--font-display);
            text-transform: uppercase;
            font-size: 1rem;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%);
            transition: 0.4s;
        }

        .cta-btn:hover { transform: scale(1.05); filter: drop-shadow(0 0 15px var(--shift-lime)); }

        /* CART UI (Такая же как в меню) */
        .cart-panel {
            position: fixed; right: -400px; top: 0; width: 350px; height: 100%;
            background: #0a0a0a; border-left: 1px solid var(--shift-lime);
            z-index: 1000; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 40px 25px; display: flex; flex-direction: column;
        }
        .cart-panel.active { right: 0; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .cart-header h2 { font-family: var(--font-display); text-transform: uppercase; font-size: 1.2rem; }
        .close-cart { color: var(--shift-lime); cursor: pointer; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        #cart-items { flex-grow: 1; overflow-y: auto; color: var(--text-gray); font-size: 0.9rem; text-align: center; padding-top: 50px; }
        .cart-footer-panel { border-top: 1px solid var(--shift-lime); padding-top: 25px; }
        .total { display: flex; justify-content: space-between; font-family: var(--font-display); font-size: 1.1rem; }
        .checkout-btn { width: 100%; background: var(--shift-lime); border: none; padding: 18px; font-family: var(--font-display); cursor: pointer; margin-top: 25px; }
        #cart-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; z-index: 999; backdrop-filter: blur(5px); }
        #cart-overlay.active { display: block; }

        .footer-info {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: center; gap: 40px;
            font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--text-gray);
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="wrapper" class="fade-wrapper">
        <nav>
            <a href="index.html" class="logo">LUMEN<span>SHIFT</span></a>
            <div class="nav-links">
                <a href="menu.html">Menu</a>
                <a href="#">Locations</a>
            </div>
            <div class="cart-trigger" onclick="toggleCart()">
                CART [0]
            </div>
        </nav>

        <section class="hero">
            <h1>Shift Your<span>Reality</span></h1>
            <a href="menu.html" class="cta-btn">Access Menu</a>
            
            <div class="footer-info">
                <span>London // 2026</span>
                <span>Open: 07:00 - 22:00</span>
                <span>Protocol: Active</span>
            </div>
        </section>
    </div>

    <div id="side-cart" class="cart-panel">
        <div class="cart-header">
            <h2>Active Protocol</h2>
            <span class="close-cart" onclick="toggleCart()">CLOSE —</span>
        </div>
        <div id="cart-items">
            Your protocol is currently empty. <br> Visit the menu to add fuel.
        </div>
        <div class="cart-footer-panel">
            <div class="total">
                <span>TOTAL</span>
                <span>£0.00</span>
            </div>
            <button class="checkout-btn">EXECUTE ORDER</button>
        </div>
    </div>
    <div id="cart-overlay" onclick="toggleCart()"></div>

    <script>
        // Плавная загрузка при открытии
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('wrapper').classList.add('is-visible');
            }, 100);
        });

        // Логика корзины
        function toggleCart() {
            document.getElementById('side-cart').classList.toggle('active');
            document.getElementById('cart-overlay').classList.toggle('active');
        }
    </script>
</body>
</html>
