<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMEN SHIFT | Future of Coffee</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-black: #000000;
            --shift-lime: #CCFF00;
            --text-white: #FFFFFF;
            --font-display: 'Archivo Black', sans-serif;
            --font-main: 'Inter', sans-serif;
        }

        /* ЗАЩИТА ОТ КОПИРОВАНИЯ */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-user-select: none; -moz-user-select: none;
            -ms-user-select: none; user-select: none;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: var(--font-main);
            overflow: hidden;
        }

        /* ПЛАВНОЕ ПОЯВЛЕНИЕ (как в твоем оригинале) */
        .fade-wrapper { 
            opacity: 0; 
            transform: translateY(30px);
            filter: blur(10px);
            transition: opacity 1.6s cubic-bezier(0.16, 1, 0.3, 1), 
                        transform 1.6s cubic-bezier(0.16, 1, 0.3, 1), 
                        filter 1.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .fade-wrapper.is-visible {
            opacity: 1; transform: translateY(0); filter: blur(0);
        }

        /* ФОНОВАЯ КАРТИНКА - ПУТЬ ИСПРАВЛЕН */
        .hero-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.8)), 
                        url('images/homepage.png') center/cover no-repeat;
            z-index: -1;
        }

        nav {
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
        }

        .logo { font-family: var(--font-display); text-decoration: none; color: white; font-size: 1.1rem; text-transform: uppercase; }
        .logo span { color: var(--shift-lime); }

        .cart-trigger {
            background: var(--shift-lime);
            color: black;
            padding: 8px 18px;
            font-family: var(--font-display);
            font-size: 0.75rem;
            cursor: pointer;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }

        .hero-content {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 8%;
        }

        .hero-content h1 {
            font-family: var(--font-display);
            font-size: clamp(3rem, 10vw, 6.5rem);
            line-height: 0.85;
            text-transform: uppercase;
            margin-bottom: 2rem;
        }

        .hero-content h1 span { color: var(--shift-lime); }

        .cta-btn {
            display: inline-block;
            padding: 22px 50px;
            background: var(--shift-lime);
            color: black;
            text-decoration: none;
            font-family: var(--font-display);
            text-transform: uppercase;
            font-size: 0.9rem;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
            transition: 0.3s;
        }

        /* КОРЗИНА (Твоя структура) */
        .cart-panel {
            position: fixed; right: -400px; top: 0; width: 350px; height: 100%;
            background: #0a0a0a; border-left: 1px solid var(--shift-lime);
            z-index: 1000; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 40px 25px;
        }
        .cart-panel.active { right: 0; }
        .close-cart { color: var(--shift-lime); cursor: pointer; text-transform: uppercase; font-size: 0.7rem; font-weight: 800; }
        #cart-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; z-index: 999; backdrop-filter: blur(5px); }
        #cart-overlay.active { display: block; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="hero-bg"></div>

    <div id="wrapper" class="fade-wrapper">
        <nav>
            <a href="index.html" class="logo">LUMEN<span>SHIFT</span></a>
            <div class="cart-trigger" onclick="toggleCart()">CART [0]</div>
        </nav>

        <main class="hero-content">
            <h1>LUMEN<br><span>SHIFT</span></h1>
            <a href="menu.html" class="cta-btn">Initiate Order</a>
        </main>
    </div>

    <div id="side-cart" class="cart-panel">
        <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom: 40px;">
            <h2 style="font-family: var(--font-display); font-size: 1.2rem; text-transform: uppercase;">Active Protocol</h2>
            <span class="close-cart" onclick="toggleCart()">Close —</span>
        </div>
        <div id="cart-items" style="color: #444; text-align: center; margin-top: 50px; font-size: 0.8rem; text-transform: uppercase;">
            Protocol is empty.
        </div>
    </div>
    <div id="cart-overlay" onclick="toggleCart()"></div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => { document.getElementById('wrapper').classList.add('is-visible'); }, 100);
        });

        function toggleCart() {
            document.getElementById('side-cart').classList.toggle('active');
            document.getElementById('cart-overlay').classList.toggle('active');
        }
    </script>
</body>
</html>
