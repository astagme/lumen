<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMEN SHIFT | High-Velocity Coffee</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-black: #000000;
            --shift-lime: #CCFF00;
            --text-white: #FFFFFF;
            --font-display: 'Archivo Black', sans-serif;
            --font-main: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: var(--font-main);
            overflow: hidden; /* Оставляем чистый экран без скролла */
        }

        nav {
            padding: 1.5rem 5%;
            display: flex; justify-content: space-between; align-items: center;
            position: fixed; top: 0; width: 100%; z-index: 1000;
        }

        .logo { font-family: var(--font-display); text-decoration: none; color: white; font-size: 1.1rem; text-transform: uppercase; }
        .logo span { color: var(--shift-lime); }

        .nav-right { display: flex; align-items: center; gap: 20px; }

        /* Та самая корзинка */
        .cart-icon {
            color: var(--text-white);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
        }

        .order-btn-nav {
            background: var(--shift-lime); color: black; padding: 8px 18px;
            font-family: var(--font-display); font-size: 0.75rem; text-decoration: none;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }

        .hero {
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
        }

        .hero h1 {
            font-family: var(--font-display);
            font-size: clamp(3rem, 12vw, 8rem);
            line-height: 0.85; text-transform: uppercase;
        }
        .hero h1 span { color: var(--shift-lime); }

        .sub-text {
            margin-top: 20px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 0.7rem;
            font-weight: 800;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">LUMEN<span>SHIFT</span></a>
        
        <div class="nav-right">
            <div class="cart-icon">Cart [0]</div>
            <a href="menu.html" class="order-btn-nav">Order</a>
        </div>
    </nav>

    <main class="hero">
        <h1>High<br><span>Velocity</span><br>Caffeine</h1>
        <p class="sub-text">Protocol v.04 // Shift Your Reality</p>
    </main>

</body>
</html>
