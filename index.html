<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMEN SHIFT | High-Velocity Specialty Coffee</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-black: #0F0F0F;
            --shift-lime: #CCFF00; /* Unique, high-energy lime */
            --text-white: #FFFFFF;
            --text-gray: #888888;
            --font-main: 'Inter', sans-serif;
            --font-display: 'Archivo Black', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: var(--font-main);
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 5%;
            position: fixed;
            width: 100%;
            z-index: 100;
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #222;
        }

        .logo {
            font-family: var(--font-display);
            font-size: 1.2rem;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .logo span { color: var(--shift-lime); }

        .nav-links a {
            text-decoration: none;
            color: var(--text-white);
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-left: 2rem;
        }

        /* Hero Section */
        .hero {
    height: 100vh;
    display: flex;
    align-items: center;
    padding: 0 5%;
    /* We added a 'grayscale' filter and a darker gradient */
    background: linear-gradient(90deg, var(--bg-black) 40%, rgba(0,0,0,0.3)), 
                url('images/homepage.png') center/cover no-repeat;
    background-blend-mode: multiply; /* This makes the image feel 'inked' into the black background */
}

        .hero-content {
            max-width: 700px;
        }

        .tagline {
            color: var(--shift-lime);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: block;
        }

        h1 {
            font-family: var(--font-display);
            font-size: clamp(3.5rem, 10vw, 6rem);
            line-height: 0.85;
            text-transform: uppercase;
            margin-bottom: 2rem;
        }

        .hero-content p {
            color: var(--text-gray);
            font-size: 1.1rem;
            margin-bottom: 3rem;
            max-width: 450px;
        }

        /* The "Action" Button - Styled like a Tech App */
        .btn-shift {
            background: var(--shift-lime);
            color: #000;
            padding: 1.2rem 3rem;
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.9rem;
            display: inline-block;
            border-radius: 0; /* Sharp edges for a modern look */
            transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .btn-shift:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(204, 255, 0, 0.3);
        }

        /* Status Bar (Convenience Feature) */
        .status-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #151515;
            padding: 1.5rem 5%;
            display: flex;
            gap: 40px;
            border-top: 1px solid #222;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--shift-lime);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--shift-lime);
        }

        /* Responsive Mobile Adjustments */
        @media (max-width: 768px) {
            .hero {
                background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                            url('images/homepage.png') center/cover;
                text-align: center;
                justify-content: center;
            }
            .status-bar { display: none; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">LUMEN<span>SHIFT</span></div>
        <div class="nav-links">
            <a href="menu.html">Menu</a>
            <a href="story.html">Locations</a>
            <a href="#" style="color: var(--shift-lime)">Download App</a>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <span class="tagline">Speed meets Craft</span>
            <h1>Don't <br>Wait. <br>Evolve.</h1>
            <p>Specialty grade beans. Precision roasting. Ready for pickup in under 180 seconds.</p>
            <a href="menu.html" class="btn-shift">Order for Pickup</a>
        </div>

        <div class="status-bar">
            <div class="status-item">
                <div class="dot"></div> Shoreditch Station: LIVE
            </div>
            <div class="status-item">
                <div class="dot"></div> Soho Central: LIVE
            </div>
            <div class="status-item" style="opacity: 0.5;">
                <div class="dot" style="background: #444; box-shadow: none;"></div> Peckham: Opening Soon
            </div>
        </div>
    </header>

</body>
</html>
