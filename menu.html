<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | LUMEN SHIFT</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-black: #000000;
            --shift-lime: #CCFF00;
            --text-white: #FFFFFF;
            --text-gray: #888888;
            --card-bg: #0a0a0a;
            --font-display: 'Archivo Black', sans-serif;
            --font-main: 'Inter', sans-serif;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-user-select: none; -moz-user-select: none; user-select: none;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: var(--font-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .fade-wrapper { 
            opacity: 0; transform: translateY(30px); filter: blur(10px);
            transition: all 1.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .fade-wrapper.is-visible { opacity: 1; transform: translateY(0); filter: blur(0); }

        /* NAV REPAIR */
        nav {
            padding: 1.5rem 5%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #111;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 100;
        }

        .logo { font-family: var(--font-display); text-decoration: none; color: white; font-size: 1.1rem; text-transform: uppercase; }
        .logo span { color: var(--shift-lime); }

        .nav-right { display: flex; align-items: center; gap: 2rem; }
        
        .nav-links a {
            text-decoration: none; color: var(--text-white); font-weight: 700;
            font-size: 0.8rem; text-transform: uppercase; margin-left: 2rem; transition: 0.3s;
        }
        .nav-links a:hover { color: var(--shift-lime); }

        .cart-trigger {
            background: var(--shift-lime); color: black; padding: 8px 18px;
            font-family: var(--font-display); font-size: 0.75rem; cursor: pointer;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
            transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .cart-bump { transform: scale(1.2); box-shadow: 0 0 20px var(--shift-lime); }

        /* MENU CONTENT */
        .menu-hero {
            height: 350px;
            background: linear-gradient(to top, var(--bg-black), transparent), 
                        url('images/menu.png') center/cover no-repeat;
            display: flex; align-items: center; padding: 0 5%;
            filter: grayscale(100%) contrast(115%); border-bottom: 1px solid #111;
        }
        .menu-hero h1 { font-family: var(--font-display); font-size: clamp(2.5rem, 6vw, 4.5rem); text-transform: uppercase; line-height: 0.9; }

        .menu-container { padding: 40px 5% 200px; max-width: 1200px; margin: 0 auto; }
        .category-header { border-left: 4px solid var(--shift-lime); padding-left: 15px; margin: 60px 0 30px; }
        .category-header h2 { font-family: var(--font-display); text-transform: uppercase; font-size: 1.4rem; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 35px; }

        .menu-card {
            background: var(--card-bg); padding: 30px; border: 1px solid #111;
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; height: 100%;
        }
        .img-container { width: 100%; height: 280px; display: flex; align-items: flex-end; justify-content: center; padding: 25px; margin-bottom: 1.5rem; }
        .menu-card img { max-width: 100%; max-height: 100%; object-fit: contain; mix-blend-mode: screen; transition: 0.5s; }
        .menu-card:hover { border-color: var(--shift-lime); background: #111; }
        .menu-card:hover img { transform: scale(1.1) translateY(-10px); }

        .price { font-weight: 800; color: var(--shift-lime); font-size: 1.2rem; }
        .add-btn { 
            width: 38px; height: 38px; background: #1a1a1a; color: white; border: none;
            display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; transition: 0.3s; 
        }
        .add-btn.success { background: var(--shift-lime) !important; color: black !important; transform: scale(0.9); }
        
        .card-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #222; padding-top: 20px; }

        /* CART PANEL */
        .cart-panel {
            position: fixed; right: -400px; top: 0; width: 350px; height: 100%;
            background: #0a0a0a; border-left: 1px solid var(--shift-lime);
            z-index: 1000; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); padding: 40px 25px; display: flex; flex-direction: column;
        }
        .cart-panel.active { right: 0; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #111; }
        .checkout-btn { width: 100%; background: var(--shift-lime); border: none; padding: 18px; font-family: var(--font-display); cursor: pointer; margin-top: 25px; text-transform: uppercase; }
        #cart-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; z-index: 999; backdrop-filter: blur(5px); }
        #cart-overlay.active { display: block; }

        .customizer {
            background: var(--shift-lime); color: black; padding: 18px 5%;
            position: fixed; bottom: 0; width: 100%; display: flex; justify-content: center; gap: 40px; font-weight: 800; text-transform: uppercase; font-size: 0.75rem; z-index: 90;
        }

        @media (max-width: 768px) { .nav-links { display: none; } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="wrapper" class="fade-wrapper">
        <nav>
            <a href="index.html" class="logo">LUMEN<span>SHIFT</span></a>
            <div class="nav-right">
                <div class="nav-links">
                    <a href="menu.html" style="color: var(--shift-lime)">Menu</a>
                    <a href="story.html">Locations</a>
                </div>
                <div class="cart-trigger" id="cart-btn" onclick="toggleCart()">
                    CART [<span id="cart-count">0</span>]
                </div>
            </div>
        </nav>

        <header class="menu-hero">
            <h1>Protocol<br>Menu</h1>
        </header>

        <main class="menu-container">
            <section>
                <div class="category-header"><h2>Core Brews</h2></div>
                <div class="grid">
                    <div class="menu-card" data-name="Shift Espresso" data-price="3.20">
                        <div class="img-container"><img src="menu/shiftespresso.png" alt="Espresso"></div>
                        <h3>Shift Espresso</h3>
                        <p>High-clarity double extraction blend.</p>
                        <div class="card-footer"><span class="price">£3.20</span><button class="add-btn">+</button></div>
                    </div>
                    <div class="menu-card" data-name="Cyber Flat White" data-price="3.95">
                        <div class="img-container"><img src="menu/flatwhite.png" alt="Flat White"></div>
                        <h3>Cyber Flat White</h3>
                        <p>Precision-steamed micro-foam texture.</p>
                        <div class="card-footer"><span class="price">£3.95</span><button class="add-btn">+</button></div>
                    </div>
                </div>
            </section>
        </main>

        <div class="customizer">
            <span>Neural Network: Online</span>
            <span>Pickup: 2 Mins</span>
            <span>Shift Status: Active</span>
        </div>
    </div>

    <div id="side-cart" class="cart-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
            <h2 style="font-family: var(--font-display); font-size: 1.1rem; text-transform: uppercase;">Active Protocol</h2>
            <span style="color: var(--shift-lime); cursor:pointer; font-size:0.7rem; font-weight:800;" onclick="toggleCart()">CLOSE —</span>
        </div>
        <div id="cart-items"></div>
        <div style="border-top: 1px solid var(--shift-lime); padding-top: 25px; margin-top: auto;">
            <div style="display:flex; justify-content:space-between; font-family: var(--font-display);">
                <span>TOTAL</span><span>£<span id="cart-total">0.00</span></span>
            </div>
            <button class="checkout-btn" onclick="alert('Order Executed!')">EXECUTE ORDER</button>
        </div>
    </div>
    <div id="cart-overlay" onclick="toggleCart()"></div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => { document.getElementById('wrapper').classList.add('is-visible'); }, 100);
        });

        let cart = [];
        const cartBtn = document.getElementById('cart-btn');

        function toggleCart() {
            document.getElementById('side-cart').classList.toggle('active');
            document.getElementById('cart-overlay').classList.toggle('active');
        }

        document.querySelectorAll('.add-btn').forEach(button => {
            button.addEventListener('click', () => {
                const card = button.closest('.menu-card');
                const name = card.getAttribute('data-name');
                const price = parseFloat(card.getAttribute('data-price'));
                cart.push({name, price});
                
                button.classList.add('success');
                button.innerText = '✓';
                cartBtn.classList.add('cart-bump');

                updateCartUI();

                setTimeout(() => { button.classList.remove('success'); button.innerText = '+'; }, 600);
                setTimeout(() => { cartBtn.classList.remove('cart-bump'); }, 300);
            });
        });

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            const totalLabel = document.getElementById('cart-total');
            const countLabel = document.getElementById('cart-count');
            container.innerHTML = '';
            let total = 0;
            
            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#444; margin-top:50px; font-size:0.8rem;">PROTOCOL EMPTY</p>';
            }

            cart.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `<div>${item.name}<br><small style="color:var(--shift-lime)">£${item.price.toFixed(2)}</small></div>
                                 <span style="color:#f33; cursor:pointer; font-weight:800;" onclick="removeFromCart(${index})">✕</span>`;
                container.appendChild(div);
                total += item.price;
            });
            totalLabel.innerText = total.toFixed(2);
            countLabel.innerText = cart.length;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }
    </script>
</body>
</html>
